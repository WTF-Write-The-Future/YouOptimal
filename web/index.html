<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="YouOptimal - Travel & Discover your perfect city.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="YouOptimal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>YouOptimal</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div id="custom-loader">
    <style>
      body {
        background-color: #F7F3E8; /* Фірмовий фон екрану */
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #custom-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        background-color: #F7F3E8;
      }
      /* Стилі для нашого лого */
      .loader-logo {
        width: 80px; /* Преміальний розмір */
        height: auto;
        margin-bottom: 32px; /* Відступ до спінера */
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(201, 186, 155, 0.3); /* Світло-золотистий */
        border-top-color: #4A5556; /* Темно-сірий акцент */
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        margin-top: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #4A5556;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 4px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
    
    <img src="assets/logo.png" alt="YouOptimal Logo" class="loader-logo">
    
    <div class="spinner"></div>
    <div class="loader-text">YOUOPTIMAL</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('custom-loader');
      if (loader) {
        loader.style.transition = 'opacity 0.6s ease-out';
        loader.style.opacity = '0';
        setTimeout(function() {
          loader.remove();
        }, 600); // Чекаємо завершення анімації перед видаленням
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
