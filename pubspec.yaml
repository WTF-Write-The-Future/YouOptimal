name: you_optimal
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  http: ^1.2.0
  supabase_flutter: ^2.12.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0  # ДОДАНО: Пакет для роботи з .env

dev_dependencies:
  flutter_test:
    sdk: flutter
  # === ДОДАНО ДЛЯ ТЕСТУВАННЯ ===
  integration_test:
    sdk: flutter
  test: ^1.24.0
  # ============================
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - env  # ДОДАНО: Щоб Flutter бачив файл з ключами

  fonts:
    - family: DM Serif Text
      fonts:
        - asset: assets/fonts/DMSerifText-Regular.ttf
        
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app.jpg"